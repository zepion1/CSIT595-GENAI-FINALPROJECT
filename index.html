<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAM-01 · Motion System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  /* ── Variables ─────────────────────────────────────────── */
  :root {
    --bg:        #080b0f;
    --panel:     #0d1117;
    --border:    #1a2433;
    --green:     #00ff88;
    --green-dim: #00a855;
    --red:       #ff3b5c;
    --amber:     #ffb833;
    --text:      #c8d8e8;
    --muted:     #4a6070;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Barlow', sans-serif;
  }

  /* ── Reset ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle scan-line grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.18) 2px,
      rgba(0,0,0,.18) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── Layout ─────────────────────────────────────────────── */
  .shell {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--green);
    letter-spacing: .12em;
  }
  .logo span { color: var(--muted); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .08em;
  }

  #clock { color: var(--text); }

  .rec-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
    margin-right: 6px;
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* ── Main grid ───────────────────────────────────────────── */
  main {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 16px;
    padding: 16px 0;
    align-items: start;
  }

  @media (max-width: 860px) {
    main { grid-template-columns: 1fr; }
  }

  /* ── Feed panel ──────────────────────────────────────────── */
  .feed-wrap {
    position: relative;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    aspect-ratio: 16/9;
  }

  .feed-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Corner brackets */
  .feed-wrap::before, .feed-wrap::after,
  .feed-inner::before, .feed-inner::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--green);
    border-style: solid;
    z-index: 2;
  }
  .feed-wrap::before  { top:8px;    left:8px;  border-width: 2px 0 0 2px; }
  .feed-wrap::after   { top:8px;    right:8px; border-width: 2px 2px 0 0; }
  .feed-inner::before { bottom:8px; left:8px;  border-width: 0 0 2px 2px; }
  .feed-inner::after  { bottom:8px; right:8px; border-width: 0 2px 2px 0; }

  /* Feed overlays */
  .feed-badge {
    position: absolute;
    top: 16px; left: 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    letter-spacing: .1em;
    z-index: 3;
    opacity: .85;
  }
  .feed-badge-br {
    position: absolute;
    bottom: 16px; right: 16px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    z-index: 3;
  }

  /* Motion flash overlay */
  .motion-flash {
    position: absolute; inset: 0;
    border: 3px solid var(--red);
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    z-index: 4;
    transition: opacity .1s;
  }
  .motion-flash.active { opacity: 1; animation: flash-pulse .5s ease-in-out infinite; }
  @keyframes flash-pulse { 0%,100%{opacity:.9} 50%{opacity:.3} }

  /* ── Sidebar ─────────────────────────────────────────────── */
  .sidebar { display: flex; flex-direction: column; gap: 12px; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Status grid */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 12px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    color: var(--green);
    line-height: 1;
  }
  .stat-value.muted { font-size: 13px; color: var(--text); word-break: break-all; }

  /* Status pills */
  .status-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .status-row:last-child { border-bottom: none; }
  .status-row .label { color: var(--muted); font-family: var(--mono); font-size: 11px; }

  .pill {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .08em;
    padding: 3px 8px;
    border-radius: 2px;
    font-weight: 600;
  }
  .pill-green  { background: rgba(0,255,136,.12); color: var(--green); }
  .pill-red    { background: rgba(255,59,92,.12);  color: var(--red); }
  .pill-amber  { background: rgba(255,184,51,.12); color: var(--amber); }
  .pill-muted  { background: rgba(74,96,112,.15);  color: var(--muted); }

  /* Cooldown bar */
  .cooldown-wrap { margin-top: 14px; }
  .cooldown-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .1em;
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--green-dim);
    border-radius: 2px;
    transition: width .9s linear;
    width: 0%;
  }

  /* Toggle button */
  .toggle-btn {
    width: 100%;
    margin-top: 14px;
    padding: 11px;
    background: transparent;
    border: 1px solid var(--green-dim);
    border-radius: 3px;
    color: var(--green);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: .1em;
    cursor: pointer;
    transition: background .15s, color .15s;
    text-transform: uppercase;
  }
  .toggle-btn:hover { background: rgba(0,255,136,.08); }
  .toggle-btn.off {
    border-color: var(--muted);
    color: var(--muted);
  }
  .toggle-btn.off:hover { background: rgba(74,96,112,.12); }

  /* Event log */
  .log-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
  }
  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-item {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 8px;
    padding: 6px 8px;
    background: var(--bg);
    border-left: 2px solid var(--border);
    border-radius: 0 2px 2px 0;
    animation: slide-in .25s ease;
  }
  .log-item.motion { border-left-color: var(--green); color: var(--text); }
  .log-item.webhook-ok  { border-left-color: var(--amber); }
  .log-item.webhook-err { border-left-color: var(--red); }

  @keyframes slide-in {
    from { opacity:0; transform: translateX(-6px); }
    to   { opacity:1; transform: translateX(0); }
  }

  .log-time { color: var(--muted); flex-shrink: 0; }

  /* ── Footer ─────────────────────────────────────────────── */
  footer {
    padding: 12px 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .08em;
  }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">CAM<span>-</span>01 &nbsp;/&nbsp; MOTION SYSTEM</div>
    <div class="header-right">
      <span><span class="rec-dot"></span>LIVE</span>
      <span id="clock">--:--:--</span>
      <span id="uptime-label">UP 00:00:00</span>
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- Feed -->
    <div class="feed-wrap" id="feedWrap">
      <img src="/stream" alt="Camera Feed" id="camFeed">
      <div class="feed-inner"></div>
      <div class="feed-badge" id="feedBadge">CAM-01 &nbsp;·&nbsp; 1280×720</div>
      <div class="feed-badge-br" id="feedTs">--</div>
      <div class="motion-flash" id="motionFlash"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">

      <!-- Stats -->
      <div class="panel">
        <div class="panel-title">Statistics</div>
        <div class="stat-grid">
          <div class="stat-box">
            <div class="stat-label">Events</div>
            <div class="stat-value" id="motionCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Last Seen</div>
            <div class="stat-value muted" id="lastSeen">—</div>
          </div>
        </div>
      </div>

      <!-- Status -->
      <div class="panel">
        <div class="panel-title">System Status</div>

        <div class="status-row">
          <span class="label">DETECTION</span>
          <span class="pill pill-green" id="detectionPill">ACTIVE</span>
        </div>
        <div class="status-row">
          <span class="label">MOTION</span>
          <span class="pill pill-muted" id="motionPill">CLEAR</span>
        </div>
        <div class="status-row">
          <span class="label">WEBHOOK</span>
          <span class="pill pill-muted" id="webhookPill">IDLE</span>
        </div>

        <div class="cooldown-wrap">
          <div class="cooldown-label">
            <span>COOLDOWN</span>
            <span id="cooldownSec">0.0 s</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" id="cooldownBar"></div>
          </div>
        </div>

        <button class="toggle-btn" id="toggleBtn" onclick="toggleDetection()">
          ⏸ Pause Detection
        </button>
      </div>

      <!-- Event log -->
      <div class="panel">
        <div class="panel-title">Event Log</div>
        <ul class="log-list" id="logList">
          <li class="log-item">
            <span class="log-time" id="startTs">--:--:--</span>
            <span>System started</span>
          </li>
        </ul>
      </div>

    </aside>
  </main>

  <!-- Footer -->
  <footer>
    <span>RASPBERRY PI · SMART CAMERA</span>
    <span id="footerRes">1280 × 720 · 10 FPS</span>
  </footer>

</div>

<script>
  // ── Clock ───────────────────────────────────────────────────
  function pad(n){ return String(n).padStart(2,'0'); }

  function tickClock(){
    const d = new Date();
    document.getElementById('clock').textContent =
      `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }
  setInterval(tickClock, 1000);
  tickClock();

  document.getElementById('startTs').textContent =
    new Date().toLocaleTimeString();

  // ── Uptime ──────────────────────────────────────────────────
  function fmtUptime(s){
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    return `UP ${pad(h)}:${pad(m)}:${pad(sec)}`;
  }

  // ── SSE state updates ────────────────────────────────────────
  const evtSrc = new EventSource('/stats');
  let prevMotion = false;
  let prevWebhook = 'idle';

  evtSrc.onmessage = function(e){
    const d = JSON.parse(e.data);

    // Uptime
    document.getElementById('uptime-label').textContent = fmtUptime(d.uptimeSeconds);

    // Feed timestamp
    document.getElementById('feedTs').textContent = new Date().toLocaleTimeString();

    // Motion count
    document.getElementById('motionCount').textContent = d.motionCount;

    // Last seen
    if(d.lastEventTs){
      const t = new Date(d.lastEventTs);
      document.getElementById('lastSeen').textContent =
        `${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
    }

    // Detection toggle
    const detPill = document.getElementById('detectionPill');
    const btn     = document.getElementById('toggleBtn');
    if(d.detectionOn){
      detPill.className = 'pill pill-green';
      detPill.textContent = 'ACTIVE';
      btn.className = 'toggle-btn';
      btn.textContent = '⏸ Pause Detection';
    } else {
      detPill.className = 'pill pill-muted';
      detPill.textContent = 'PAUSED';
      btn.className = 'toggle-btn off';
      btn.textContent = '▶ Resume Detection';
    }

    // Motion pill + flash
    const motPill = document.getElementById('motionPill');
    const flash   = document.getElementById('motionFlash');
    if(d.motionActive){
      motPill.className = 'pill pill-red';
      motPill.textContent = 'DETECTED';
      flash.classList.add('active');
    } else {
      motPill.className = 'pill pill-muted';
      motPill.textContent = 'CLEAR';
      flash.classList.remove('active');
    }

    // Log new motion event
    if(d.motionActive && !prevMotion){
      addLog('motion', 'Motion detected');
    }
    prevMotion = d.motionActive;

    // Webhook pill
    const whPill = document.getElementById('webhookPill');
    if(d.webhookStatus === 'ok'){
      whPill.className = 'pill pill-amber';
      whPill.textContent = 'SENT ✓';
      if(prevWebhook !== 'ok') addLog('webhook-ok', 'Webhook delivered');
    } else if(d.webhookStatus === 'error'){
      whPill.className = 'pill pill-red';
      whPill.textContent = 'ERROR';
      if(prevWebhook !== 'error') addLog('webhook-err', 'Webhook failed');
    } else {
      whPill.className = 'pill pill-muted';
      whPill.textContent = 'IDLE';
    }
    prevWebhook = d.webhookStatus;

    // Cooldown bar
    const pct = Math.min(100, (d.cooldownLeft / {{ cooldown_seconds }}) * 100);
    document.getElementById('cooldownBar').style.width = pct + '%';
    document.getElementById('cooldownSec').textContent = d.cooldownLeft.toFixed(1) + ' s';
  };

  // ── Event log helper ─────────────────────────────────────────
  function addLog(type, msg){
    const list = document.getElementById('logList');
    const li   = document.createElement('li');
    li.className = `log-item ${type}`;
    li.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString()}</span><span>${msg}</span>`;
    list.prepend(li);
    // Keep max 30 entries
    while(list.children.length > 30) list.removeChild(list.lastChild);
  }

  // ── Toggle ───────────────────────────────────────────────────
  function toggleDetection(){
    fetch('/toggle', { method:'POST' })
      .then(r => r.json())
      .then(d => {
        addLog('', d.detectionOn ? 'Detection resumed' : 'Detection paused');
      });
  }
</script>
</body>
</html>
